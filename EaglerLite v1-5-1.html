      if (CFG.hud) { var hud = document.createElement('div'); Object.assign(hud.style, { position: 'fixed', top: '4px', left: '4px', background: 'rgba(0,0,0,0.65)', color: '#ffffff', font: 'bold 11px/1.9 "Courier New",monospace', padding: '5px 11px', borderRadius: '4px', zIndex: '999999', pointerEvents: 'none', userSelect: 'none', whiteSpace: 'pre', border: '1px solid rgba(255,255,255,0.15)', letterSpacing: '0.02em' }); function attachHUD() { if (document.body) document.body.appendChild(hud); } if (document.body) attachHUD(); else document.addEventListener('DOMContentLoaded', attachHUD); var t0 = performance.now(), fr = 0, d0 = 0; (function tick() { origRAF(tick); fr++; var now = performance.now(), dt = now - t0; if (dt < 500) return; var fps = (fr / dt * 1000).toFixed(1); var dpf = ((S.draws - d0) / fr).toFixed(1); var thrtl = CFG.p3 && document.hidden ? 'YES' : 'NO'; hud.textContent = 'FPS       ' + fps + '\n' + 'Draw/f    ' + dpf + '\n' + 'Throttled ' + thrtl; t0 = now; fr = 0; d0 = S.draws; })(); var f3 = false; window.addEventListener('keydown', function(e) { if (e.code === 'F3') f3 = true; if (e.code === 'KeyO' && f3) hud.style.display = hud.style.display === 'none' ? '' : 'none'; }); window.addEventListener('keyup', function(e) { if (e.code === 'F3') f3 = false; }); }
    }

    function setStatus(msg, cls) { var el = document.getElementById('status'); el.textContent = msg; el.className = cls || ''; }
    function setProgress(v) { document.getElementById('prog-fill').style.width = Math.round(Math.max(0, Math.min(1, v)) * 100) + '%'; }
    function setBusy(on) { var btn = document.getElementById('launchBtn'); btn.disabled = on; btn.textContent = on ? 'Loading…' : 'Launch Game'; }
    function decodeBlob(blob) { return new Promise(function(res, rej) { var fr = new FileReader(); fr.onload = function() { res(fr.result); }; fr.onerror = function() { rej(fr.error); }; fr.readAsText(blob); }); }

    async function launchGame() {
      var version = document.getElementById('gameVersion').value;
      var srcUrl = (version === '1.21.11') ? SRC_URL_121 : SRC_URL_112;
      var tabName = (document.getElementById('tabName').value.trim()) || 'Eaglercraft';
      var sprintKey = (document.getElementById('sprintKey').value.trim()) || 'ControlLeft';
      var favicon = document.getElementById('favicon').value.trim();
      
      var cfg = {
        p1: document.getElementById('ch1').checked, p3: document.getElementById('ch3').checked, p4: document.getElementById('ch4').checked,
        p5: document.getElementById('ch5').checked, p6: document.getElementById('ch6').checked, p7: document.getElementById('ch11').checked,
        p8: document.getElementById('ch12').checked, p9: document.getElementById('ch13').checked, p10: document.getElementById('ch14').checked,
        p11: document.getElementById('ch15').checked, p12: document.getElementById('ch16').checked, p13: document.getElementById('ch17').checked,
        p14: document.getElementById('ch18').checked, fullbright: document.getElementById('ch8').checked, autosprint: document.getElementById('ch9').checked,
        zoom: document.getElementById('ch10').checked, hud: document.getElementById('ch7').checked, tabName: tabName, sprintKey: sprintKey, favicon: favicon, gameVersion: version
      };

      if (version === '1.21.11') {
        // --- DIRECT OPEN FOR 1.21.11 ---
        // Opens directly to Netlify to preserve COOP/COEP headers for SharedArrayBuffer support.
        setBusy(true); setProgress(1); setStatus('Launching 1.21.11...', 'load');
        var url = new URL(srcUrl);
        Object.keys(cfg).forEach(function(key) { if (typeof cfg[key] === 'boolean') { url.searchParams.set(key, cfg[key]); } else if (cfg[key]) { url.searchParams.set(key, cfg[key]); } });

        window.open(url.toString(), '_blank');
        
        setTimeout(function() { setStatus('✓ Launched 1.21.11!', 'ok'); setBusy(false); }, 500);

      } else {
        // --- DIRECT FETCH METHOD FOR 1.12.2 ---
        var optiCode = '(' + EaglerLiteOptimizer.toString() + ')(' + JSON.stringify(cfg) + ');';
        var safeOptiCode = optiCode.replace(/<\/script>/gi, '<\\/script>');
        var win = window.open('about:blank', '_blank');
        if (!win) { setStatus('Pop-up blocked!', 'err'); return; }
        try { win.document.title = tabName; } catch(_) {}
        setBusy(true); setProgress(0); setStatus('Fetching game data...', 'load');

        var response;
        try {
          response = await fetch(srcUrl);
          if (!response.ok) throw new Error('HTTP ' + response.status);
        } catch (err) {
          setStatus('Direct download blocked, retrying via proxy...', 'load');
          try {
            var proxyUrl = 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(srcUrl);
            response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('HTTP ' + response.status);
          } catch (err2) { setStatus('Download failed: ' + err2.message, 'err'); setBusy(false); return; }
        }

        var total = +response.headers.get('Content-Length') || 0;
        var reader = response.body.getReader(); var parts = []; var loaded = 0;
        for (;;) { var chunk = await reader.read(); if (chunk.done) break; parts.push(chunk.value); loaded += chunk.value.length; if (total) setProgress(Math.min(0.9, loaded / total)); else setProgress(0.5); if (total) setStatus('Downloading... ' + Math.round((loaded / total) * 100) + '%', 'load'); }
        setProgress(0.95); setStatus('Decoding game data...', 'load');
        var content = await decodeBlob(new Blob(parts));
        content = content.replace(/^<\?xml[^>]*\?>\s*/i, '');
        setStatus('Injecting optimizations...', 'load');
        var inject = '<base href="' + srcUrl.substring(0, srcUrl.lastIndexOf('/') + 1) + '">\n<scr' + 'ipt>' + safeOptiCode + '</scr' + 'ipt>\n';
        try { win.document.open(); win.document.write(inject + content); win.document.close(); } catch(e) { setStatus('Error launching: ' + e.message, 'err'); }
        setStatus('✓ Launched in new tab!', 'ok'); setProgress(1); setBusy(false);
      }
    }

    document.getElementById('launchBtn').addEventListener('click', launchGame);
    document.getElementById('tabName').addEventListener('keydown', function(e) { if (e.key === 'Enter') launchGame(); });
  </script>
</body>
